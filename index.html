<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SF Measurer</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#080B10;color:#00C8FF;font-family:monospace;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;padding:20px;text-align:center}
.logo{font-size:32px;font-weight:700;letter-spacing:6px}.sub{opacity:.5;font-size:13px;letter-spacing:2px}.card{background:#0F1319;border:1px solid rgba(0,200,255,.2);border-radius:12px;padding:24px;max-width:400px;width:100%}
.step{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px;text-align:left}.num{width:24px;height:24px;border-radius:50%;background:rgba(0,200,255,.15);border:1px solid rgba(0,200,255,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700}
.loader{width:48px;height:48px;border:2px solid rgba(0,200,255,.15);border-top-color:#00C8FF;border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style></head>
<body><div class="loader"></div><div class="logo">SF·MEASURE</div><div class="sub">SMARTFILM FIELD MEASURER · v2</div>
<div class="card"><div class="step"><div class="num">⚡</div><div>Full app deploying — check back in 60 seconds</div></div>
<div class="step"><div class="num">📐</div><div>SmartFilm Measurer PWA for iOS, Android & Desktop</div></div>
<div class="step"><div class="num">🧭</div><div>AR Camera Measure · Auto Compass · Smart Zones</div></div></div></body></html>
